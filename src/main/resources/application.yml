logging:
  level.root: WARN
  level.no: ${LOG_LEVEL:INFO}
  level.org.springframework: WARN
  level.org.springframework.web: WARN
  level.org.springframework.kafka: WARN
  level.org.apache.jena.riot: ERROR

server:
  port: 8080

spring:
  aop:
    proxy-target-class: false
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS}
    properties:
      specific.avro.reader: false
      auto.register.schemas: false
      use.latest.version: true
      value.subject.name.strategy: io.confluent.kafka.serializers.subject.RecordNameStrategy
      key.subject.name.strategy: io.confluent.kafka.serializers.subject.RecordNameStrategy
    consumer:
      group-id: ${SPRING_KAFKA_CONSUMER_GROUP_ID:fdk-harvest-archive}
      auto-offset-reset: earliest
      enable-auto-commit: false
      value-deserializer: io.confluent.kafka.serializers.KafkaAvroDeserializer
      properties:
        schema.registry.url: ${SPRING_KAFKA_CONSUMER_PROPERTIES_SCHEMA_REGISTRY_URL}
    listener:
      ack-mode: manual_immediate
      # false = app starts even when Kafka is down (listener can be started later when Kafka is available)
      auto-startup: ${SPRING_KAFKA_LISTENER_AUTO_STARTUP:false}

app:
  archive:
    dataset-dir: ${APP_ARCHIVE_DATASET_DIR}
    concept-dir: ${APP_ARCHIVE_CONCEPT_DIR}
    data-service-dir: ${APP_ARCHIVE_DATASERVICE_DIR}
    information-model-dir: ${APP_ARCHIVE_INFORMATIONMODEL_DIR}
    event-dir: ${APP_ARCHIVE_EVENT_DIR}
    service-dir: ${APP_ARCHIVE_SERVICE_DIR}
    zip-check-interval-ms: ${APP_ARCHIVE_ZIP_CHECK_INTERVAL_MS}

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
    instances:
      dataset-archive-cb:
        baseConfig: default
      concept-archive-cb:
        baseConfig: default
      dataservice-archive-cb:
        baseConfig: default
      informationmodel-archive-cb:
        baseConfig: default
      event-archive-cb:
        baseConfig: default
      service-archive-cb:
        baseConfig: default

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true

---
spring:
  config.activate.on-profile: develop
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      properties:
        schema.registry.url: http://localhost:8081
app:
  archive:
    dataset-dir: dev-archive/datasets
    concept-dir: dev-archive/concepts
    data-service-dir: dev-archive/data_services
    information-model-dir: dev-archive/information_models
    event-dir: dev-archive/events
    service-dir: dev-archive/services
    zip-check-interval-ms: 300000
